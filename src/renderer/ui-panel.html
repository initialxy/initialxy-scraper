<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network Monitor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 500px;
        height: 100vh;
        background: #1a1a1a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        flex-direction: column;
      }
      .header {
        padding: 12px 16px;
        border-bottom: 1px solid #333;
        background: #222;
      }
      .header h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .filter-input {
        width: 100%;
        padding: 8px 12px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 4px;
        color: #fff;
        font-size: 12px;
        outline: none;
      }
      .filter-input:focus {
        border-color: #007bff;
      }
      .request-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .request-row {
        padding: 8px 12px;
        margin-bottom: 4px;
        background: #252525;
        border-radius: 4px;
        cursor: pointer;
        opacity: 0.5;
        transition:
          opacity 0.2s,
          background-color 0.2s;
      }
      .request-row:hover {
        background: #2a2a2a;
      }
      .request-row.complete {
        opacity: 1;
      }
      .request-row.copied {
        background: #2d5a2d;
      }
      .request-row .method {
        font-size: 11px;
        font-weight: 600;
        color: #007bff;
        margin-bottom: 2px;
      }
      .request-row .url {
        font-size: 11px;
        color: #ccc;
        word-break: break-all;
        margin-bottom: 2px;
      }
      .request-row .status {
        font-size: 10px;
        color: #888;
      }
      .footer {
        padding: 12px 16px;
        border-top: 1px solid #333;
        background: #222;
      }
      .copy-source-btn {
        width: 100%;
        padding: 10px;
        background: #007bff;
        border: none;
        border-radius: 4px;
        color: #fff;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .copy-source-btn:hover {
        background: #0056b3;
      }
      .copy-source-btn.copied {
        background: #28a745;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>Network Monitor</h2>
      <input type="text" class="filter-input" placeholder="Filter by URL..." />
    </div>
    <div class="request-list"></div>
    <div class="footer">
      <button class="copy-source-btn">Copy Page Source</button>
    </div>

    <script>
      const requestList = document.querySelector('.request-list');
      const filterInput = document.querySelector('.filter-input');
      const copySourceBtn = document.querySelector('.copy-source-btn');

      const requests = new Map();

      window.api.onNetworkRequestStart((data) => {
        const row = document.createElement('div');
        row.className = 'request-row';
        row.dataset.id = data.id;
        row.innerHTML = `
        <div class="method">${data.method}</div>
        <div class="url">${escapeHtml(data.url)}</div>
        <div class="status"></div>
      `;
        requestList.appendChild(row);
        requests.set(data.id, { row, data });
        requestList.scrollTop = requestList.scrollHeight;
      });

      window.api.onNetworkRequestComplete((data) => {
        const req = requests.get(data.id);
        if (req) {
          req.row.classList.add('complete');
          req.row.querySelector('.status').textContent = `${data.statusCode}`;
        }
      });

      requestList.addEventListener('click', async (e) => {
        const row = e.target.closest('.request-row');
        if (!row) return;

        const id = parseInt(row.dataset.id);
        const req = requests.get(id);
        if (!req) return;

        const curl = generateCurl(req.data);
        await window.api.copyToClipboard(curl);

        row.classList.add('copied');
        setTimeout(() => row.classList.remove('copied'), 300);
      });

      filterInput.addEventListener('input', (e) => {
        const filter = e.target.value.toLowerCase();
        requests.forEach((req) => {
          const matches = req.data.url.toLowerCase().includes(filter);
          req.row.style.display = matches ? 'block' : 'none';
        });
      });

      copySourceBtn.addEventListener('click', async () => {
        const source = await window.api.getPageSource();
        await window.api.copyToClipboard(source);

        copySourceBtn.classList.add('copied');
        setTimeout(() => copySourceBtn.classList.remove('copied'), 300);
      });

      function generateCurl(data) {
        const headers = Object.entries(data.headers)
          .map(([k, v]) => `  -H "${escapeCurl(k)}: ${escapeCurl(v)}"`)
          .join('\n');
        return `curl -X ${data.method} "${escapeCurl(data.url)}" \\\n${headers}`;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function escapeCurl(text) {
        return text.replace(/"/g, '\\"').replace(/`/g, '\\`').replace(/\$/g, '\\$');
      }
    </script>
  </body>
</html>
